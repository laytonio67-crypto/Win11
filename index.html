<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%2312161c%22/><rect x=%2222%22 y=%2222%22 width=%2256%22 height=%2256%22 fill=%22none%22 stroke=%22%23ffb000%22 stroke-width=%228%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- BOOT SEQUENCE -->
<div id="boot-screen">
  <pre id="boot-log"></pre>
  <div id="boot-bar-track"><div id="boot-bar-fill"></div></div>
</div>

<!-- DESKTOP -->
<div id="desktop" hidden>

  <div id="crt-overlay"></div>

  <!-- Top status bar -->
  <div id="topbar">
    <button id="launcher-btn" class="topbar-item">
      <span class="logo-mark" aria-hidden="true"></span>
      <span>DRIFT</span>
    </button>
    <div id="topbar-appname" class="topbar-item">Desktop</div>
    <div class="topbar-spacer"></div>
    <div id="topbar-status" class="topbar-item" title="System status">● ONLINE</div>
    <div id="topbar-clock" class="topbar-item">00:00:00</div>
  </div>

  <!-- Launcher menu -->
  <div id="launcher-menu" hidden>
    <div class="launcher-header">Applications</div>
    <button class="launcher-app" data-app="terminal"><span class="app-glyph">&gt;_</span>Terminal</button>
    <button class="launcher-app" data-app="notepad"><span class="app-glyph">✎</span>Notepad</button>
    <button class="launcher-app" data-app="files"><span class="app-glyph">▤</span>Files</button>
    <button class="launcher-app" data-app="calculator"><span class="app-glyph">#</span>Calculator</button>
    <button class="launcher-app" data-app="about"><span class="app-glyph">i</span>About Drift</button>
    <div class="launcher-divider"></div>
    <button class="launcher-app" id="reboot-btn"><span class="app-glyph">⟲</span>Restart System</button>
  </div>

  <!-- Desktop icon grid -->
  <div id="icon-grid">
    <button class="desktop-icon" data-app="terminal">
      <span class="icon-glyph">&gt;_</span><span class="icon-label">Terminal</span>
    </button>
    <button class="desktop-icon" data-app="notepad">
      <span class="icon-glyph">✎</span><span class="icon-label">Notepad</span>
    </button>
    <button class="desktop-icon" data-app="files">
      <span class="icon-glyph">▤</span><span class="icon-label">Files</span>
    </button>
    <button class="desktop-icon" data-app="calculator">
      <span class="icon-glyph">#</span><span class="icon-label">Calculator</span>
    </button>
    <button class="desktop-icon" data-app="about">
      <span class="icon-glyph">i</span><span class="icon-label">About</span>
    </button>
  </div>

  <!-- Windows are injected here at runtime -->
  <div id="window-layer"></div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-running"></div>
  </div>
</div>

<script src="js/boot.js"></script>
<script src="js/windowManager.js"></script>
<script src="js/apps.js"></script>
<script src="js/main.js"></script>
</body>
</html>
